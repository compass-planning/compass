app = 'compass-planning'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "120s"
  grace_period = "2m"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
